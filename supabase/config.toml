# Supabase CLI Konfiguration. Pflichtfeld ist nur `project_id`,
# alles andere wird vom Hosted-Projekt übernommen.

project_id = "notenapp"

[functions.calendar]
verify_jwt = false

# push-runner wird via pg_cron getriggert; JWT bleibt aktiviert (Service-Role
# wird im Authorization-Header mitgesendet).

# nudge ("Anstupsen") wird vom Browser des eingeloggten Nutzers aufgerufen.
# verify_jwt MUSS false sein, sonst blockt die Plattform den CORS-Preflight
# (OPTIONS trägt keinen Auth-Header) → "Failed to send a request to the Edge
# Function". Die Function verifiziert das JWT selbst (auth.getUser) und prüft
# die Freundschaft serverseitig – ist also trotzdem abgesichert.
[functions.nudge]
verify_jwt = false
